controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    drive_controller:
      type: velocity_controllers/JointGroupVelocityController

    steering_controller:
      type: position_controllers/JointGroupPositionController

drive_controller:
  ros__parameters:
    joints:
      - base_wheelrl_joint
      - base_wheelrr_joint

steering_controller:
  ros__parameters:
    joints:
      - base_hubfl_joint
      - base_hubfr_joint
