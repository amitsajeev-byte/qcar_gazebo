controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    steering_controller:
      type: position_controllers/JointGroupPositionController

joint_state_broadcaster:
  ros__parameters:
    publish_rate: 50.0

diff_drive_controller:
  ros__parameters:
    left_wheel_names: ['base_wheelrl_joint']
    right_wheel_names: ['base_wheelrr_joint']
    wheel_separation: 0.1122
    wheel_radius: 0.0342
    odom_frame_id: odom
    base_frame_id: base
    use_stamped_vel: false
    publish_rate: 50.0
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    open_loop: false
    enable_odom_tf: true

steering_controller:
  ros__parameters:
    joints:
      - base_hubfl_joint
      - base_hubfr_joint